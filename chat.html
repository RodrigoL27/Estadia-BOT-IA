<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat Médico</title>

<style>
body {
  font-family: Arial;
  background: #ece5dd;
}

#chat {
  width: 350px;
  height: 500px;
  margin: 20px auto;
  background: white;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#mensajes {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 5px;
  padding: 8px;
  border-radius: 8px;
  max-width: 70%;
}

.user {
  background: #dcf8c6;
  align-self: flex-end;
}

.bot {
  background: #f1f0f0;
  align-self: flex-start;
}

#inputArea {
  display: flex;
  border-top: 1px solid #ccc;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  background: #25d366;
  color: white;
}
</style>

</head>

<body>

<div id="chat">
  <div id="mensajes"></div>

  <div id="inputArea">
    <input id="msg" placeholder="Escribe tus síntomas..." />
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script>
async function enviar() {
  const input = document.getElementById("msg");
  const mensaje = input.value;

  if (!mensaje) return;

  agregarMensaje(mensaje, "user");
  input.value = "";

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ mensaje })
  });

  const data = await res.json();

  agregarMensaje(data.reply, "bot");
}

function agregarMensaje(texto, tipo) {
  const cont = document.getElementById("mensajes");

  const div = document.createElement("div");
  div.classList.add("msg", tipo);
  div.textContent = texto;

  cont.appendChild(div);
  cont.scrollTop = cont.scrollHeight;
}
</script>

</body>
</html>
